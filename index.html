<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BioLink Distribuidora Mona</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body class="min-vh-100 d-flex align-items-center justify-content-center bg-gradient" style="background-color:#ff0080;">

  <div class="card text-center shadow-lg rounded-4 p-4"
       style="max-width: 400px; width: 100%; font-family: 'Poppins', sans-serif;">

    <!-- Avatar -->
    <img src="DBM.png"
         alt="Avatar"
         class="rounded-circle mx-auto d-block mb-2"
         width="200"
         height="200">

    <!-- Bio -->
    <div class="text-dark mb-4">
      <strong>Luce Mona, Ponte Mona ✨</strong><br>
      Sigue nuestras redes sociales o contáctanos<br>
      •••••••••••••••••••••••••@•••••••••••••••••••••••••
    </div>

    <!-- BOTONES EN 2 COLUMNAS -->
    <div class="row g-3 justify-content-center">

      <div class="col-6">
        <a href="https://www.facebook.com/DistribuidoradeBellezaMona/" 
        target="_blank"
        class="btn btn-light rounded-3 w-100">
          <img src="Facebook.png" class="img-fluid" alt="Facebook">
        </a>
      </div>

      <div class="col-6">
        <a href="https://wa.me/528781736361?text=¡Hola!%20Quiero%20más%20informacion%20de" 
        target="_blank"
        class="btn btn-light rounded-3 w-100">
          <img src="Whatsapp.png" class="img-fluid" alt="WhatsApp">
        </a>
      </div>

      <div class="col-6">
        <a href="https://www.instagram.com/distribuidoradebellezamona?utm_source=qr&igsh=MWNjODJheGpnYXFtYQ==" 
        target="_blank"
        class="btn btn-light rounded-3 w-100">
          <img src="Insta.png" class="img-fluid" alt="Instagram">
        </a>
      </div>

      <div class="col-6">
        <a href="https://www.tiktok.com/@distrimona" 
        target="_blank"
        class="btn btn-light rounded-3 w-100">
          <img src="Tiktok.png" class="img-fluid" alt="TikTok">
        </a>
      </div>

      <!-- Google Maps -->
      <div class="col-6">
        <a href="https://www.google.com/maps?q=Distribuidora+de+Belleza+Mona"
           target="_blank"
           class="btn btn-light rounded-3 w-100">
          <img src="Gmaps.png" class="img-fluid" alt="Ubicación">
        </a>
      </div>

      <!-- Llamar -->
      <div class="col-6">
        <a href="tel:+528781736361"
           class="btn btn-light rounded-3 w-100">
          <img src="Phone.png" class="img-fluid" alt="Llamar">
        </a>
      </div>

    </div>

    <!-- Footer -->
    <div class="text-dark small mt-4">
      Mar Negro 1969, Col. Año 2000, Piedras Negras, Coahuila<br>
      © 2026 · Distribuidora de Belleza Mona 😎
    </div>

  </div>

</html>
