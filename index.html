<!-- Contador simple -->
<script>

const namespace = 'mona-visitas';

let visitas = localStorage.getItem(namespace);

if(!visitas){

visitas = Math.floor(Math.random()*100)+50;

}

visitas++;

localStorage.setItem(namespace,visitas);

document.getElementById("visitas").innerText = visitas;
