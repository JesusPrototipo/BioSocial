<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Distribuidora Mona | Redes</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fuente -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ff0080,#ff4da6);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
max-width:420px;
width:100%;
border:none;
animation:fadein .8s ease;
}

@keyframes fadein{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.social-btn{
transition:all .25s;
background:white;
}

.social-btn:hover{
transform:scale(1.07);
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.counter{
font-size:14px;
opacity:.8;
}

</style>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-100XW4J4SL"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-100XW4J4SL');
</script>

</head>

<body>

<div class="card shadow-lg rounded-4 text-center p-4">

<img src="DBM.png"
class="rounded-circle mx-auto mb-3"
width="180">

<h4 class="fw-bold">Distribuidora Mona</h4>

<div class="mb-4">
<strong>Luce Mona, Ponte Mona ✨</strong><br>
Sigue nuestras redes sociales
</div>

<div class="row g-3">

<div class="col-6">
<a onclick="trackClick('facebook')"
href="https://www.facebook.com/DistribuidoradeBellezaMona/"
target="_blank"
class="btn social-btn w-100 rounded-3">
<img src="Facebook.png" class="img-fluid">
</a>
</div>

<div class="col-6">
<a onclick="trackClick('whatsapp')"
href="https://wa.me/528781736361?text=¡Hola!%20Quiero%20más%20informacion"
target="_blank"
class="btn social-btn w-100 rounded-3">
<img src="Whatsapp.png" class="img-fluid">
</a>
</div>

<div class="col-6">
<a onclick="trackClick('instagram')"
href="https://www.instagram.com/distribuidoradebellezamona"
target="_blank"
class="btn social-btn w-100 rounded-3">
<img src="Insta.png" class="img-fluid">
</a>
</div>

<div class="col-6">
<a onclick="trackClick('tiktok')"
href="https://www.tiktok.com/@distrimona"
target="_blank"
class="btn social-btn w-100 rounded-3">
<img src="Tiktok.png" class="img-fluid">
</a>
</div>

<div class="col-6">
<a onclick="trackClick('maps')"
href="https://www.google.com/maps?q=Distribuidora+de+Belleza+Mona"
target="_blank"
class="btn social-btn w-100 rounded-3">
<img src="Gmaps.png" class="img-fluid">
</a>
</div>

<div class="col-6">
<a onclick="trackClick('telefono')"
href="tel:+528781736361"
class="btn social-btn w-100 rounded-3">
<img src="Phone.png" class="img-fluid">
</a>
</div>

</div>

<div class="mt-4 small">

Mar Negro 1969<br>
Col. Año 2000<br>
Piedras Negras, Coahuila

</div>

<div class="counter mt-3">

👀 Visitas:  
<span id="visitas">Cargando...</span>

</div>

<div class="small mt-2">

© 2026 Distribuidora Mona 😎

</div>

</div>

<script>

/* TRACKING CLICKS */

function trackClick(red){

gtag('event','click_red',{
event_category:'redes',
event_label:red
});

}

/* CONTADOR SIMPLE LOCAL */

const key="mona_visitas";

let visitas=localStorage.getItem(key);

if(!visitas){
visitas=50;
}

visitas++;

localStorage.setItem(key,visitas);

document.getElementById("visitas").innerText=visitas;

</script>

</body>
</html>
